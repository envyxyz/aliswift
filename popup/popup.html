<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="theme-dark">
    <div id="app">
      <div class="header">
        <div class="header-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#ff7a17">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          <span class="app-title">AliSwift</span>
        </div>
      </div>

      <div class="sheet-selector">
        <svg
          width="16"
          height="16"
          viewBox="0 0 507 507"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="507" height="507" rx="50" fill="#0F9D58" />
          <path
            d="M331 123H176L123 176v232l53 53h208l53-53V176l-53-53h-53z"
            fill="white"
            fill-opacity="0.3"
          />
          <rect x="153" y="230" width="201" height="22" fill="white" />
          <rect x="153" y="270" width="201" height="22" fill="white" />
          <rect x="153" y="310" width="201" height="22" fill="white" />
          <rect x="153" y="190" width="201" height="22" fill="white" />
        </svg>
        <div class="custom-select" id="sheetDropdown">
          <div class="selected-sheet" id="selectedSheet">
            No sheets configured
          </div>
          <div class="sheet-options" id="sheetOptions" style="display: none">
            <!-- populated by JS -->
          </div>
        </div>
        <svg
          class="dropdown-arrow"
          id="dropdownArrow"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M7 10l5 5 5-5z" />
        </svg>
      </div>

      <div class="fields">
        <div class="field-group">
          <label>Keywords</label>
          <input
            type="text"
            id="title"
            class="input-field"
            placeholder="Product keywords..."
          />
        </div>

        <div class="field-group">
          <label>Cost Price</label>
          <div class="input-wrapper">
            <span class="prefix">$</span>
            <input
              type="text"
              id="price"
              class="input-field has-prefix"
              placeholder="0.00"
            />
          </div>
        </div>

        <div class="field-group">
          <label>Sell Price <span class="optional">(optional)</span></label>
          <div class="input-wrapper">
            <span class="prefix">$</span>
            <input
              type="text"
              id="salePrice"
              class="input-field has-prefix"
              placeholder="0.00"
            />
          </div>
        </div>

        <div class="field-group">
          <label>Link</label>
          <input
            type="text"
            id="link"
            class="input-field link-field"
            readonly
            placeholder="aliexpress.com/item/123..."
          />
        </div>
      </div>

      <button id="addBtn">Add to Sheet</button>
      <p id="status"></p>

      <div class="footer">
        <button class="footer-icon" id="githubBtn" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
        </button>
        <button class="footer-icon" id="settingsBtn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94c0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.62l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.48.1.62l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.62l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.48-.1-.62l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
            />
          </svg>
        </button>
        <button class="footer-icon" id="themeToggle" title="Toggle theme">
          <span id="themeIcon"></span>
        </button>
        <button class="footer-icon" id="profileBtn" title="Connect Google">
          <svg
            id="profileIcon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
        </button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
