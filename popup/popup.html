<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="theme-dark">
<div id="app">
  <div class="header">
    <div class="header-left">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#ff7a17">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span class="app-title">AliSwift</span>
    </div>
  </div>

  <div class="fields">
    <div class="field-group">
      <label>Keywords</label>
      <input type="text" id="title" class="input-field" placeholder="Product keywords...">
    </div>

    <div class="field-group">
      <label>Cost Price</label>
      <div class="input-wrapper">
        <span class="prefix">$</span>
        <input type="text" id="price" class="input-field has-prefix" placeholder="0.00">
      </div>
    </div>

    <div class="field-group">
      <label>Sell Price <span class="optional">(optional)</span></label>
      <div class="input-wrapper">
        <span class="prefix">$</span>
        <input type="text" id="salePrice" class="input-field has-prefix" placeholder="0.00">
      </div>
    </div>

    <div class="field-group">
      <label>Link</label>
      <input type="text" id="link" class="input-field link-field" readonly placeholder="aliexpress.com/item/123...">
    </div>
  </div>

  <button id="addBtn">Add to Sheet</button>
  <p id="status"></p>

  <div class="footer">
    <button class="footer-icon" id="githubBtn" title="GitHub">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </button>
    <button class="footer-icon" id="settingsBtn" title="Settings">
      <span class="material-icons">settings</span>
    </button>
    <button class="footer-icon" id="themeToggle" title="Toggle theme">
      <span class="material-icons" id="themeIcon">light_mode</span>
    </button>
    <button class="footer-icon" id="profileBtn" title="Connect Google">
      <span class="material-icons" id="profileIcon">account_circle</span>
    </button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
